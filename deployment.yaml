apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-demo

  template:
    metadata:
      labels:
        app: java-demo

    spec:
      containers:
      - name: java-demo
        image: krishikaa399/java-demo:latest
        ports:
        - containerPort: 8081
        apiVersion: v1
---
kind: Service
metadata:
  name: java-demo-service

spec:
  type: NodePort

  selector:
    app: java-demo

  ports:
  - port: 80
    targetPort: 8081
    nodePort: 30009
