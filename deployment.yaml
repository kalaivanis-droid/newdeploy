apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: docker-demo

  template:
    metadata:
      labels:
        app: docker-demo

    spec:
      containers:
      - name: docker-demo
        image: username/docker-demo:latest
        ports:
        - containerPort: 8081
        apiVersion: v1
kind: Service
metadata:
  name: docker-demo-service

spec:
  type: NodePort

  selector:
    app: docker-demo

  ports:
  - port: 80
    targetPort: 8081
    nodePort: 30008